<audio id="bgMusic" loop>
    <source src="../assets/audio/background.mp3" type="audio/mpeg">
</audio>

<button id="musicToggle" class="music-btn">
    <i class="fa-solid fa-music"></i>
</button>

<style>
    .music-btn{

    position:fixed;

    bottom:30px;
    right:30px;

    width:60px;
    height:60px;

    border:none;
    border-radius:50%;

    cursor:pointer;

    background:#00ff88;

    color:#000;

    font-size:20px;

    z-index:9999;

    transition:.3s ease;

    box-shadow:
    0 0 20px rgba(0,255,136,.4);

}

.music-btn:hover{

    transform:scale(1.1);

    box-shadow:
    0 0 30px rgba(0,255,136,.8);

}
</style>
<script>
    const bgMusic = document.getElementById("bgMusic");
const musicToggle = document.getElementById("musicToggle");

let musicPlaying = false;

// Try autoplay
window.addEventListener("load", async () => {

    try {

        bgMusic.volume = 0.3;

        await bgMusic.play();

        musicPlaying = true;

    } catch (err) {

        console.log("Autoplay blocked by browser.");

    }

});

// Toggle button
musicToggle.addEventListener("click", () => {

    if(musicPlaying){

        bgMusic.pause();

        musicPlaying = false;

        musicToggle.innerHTML =
        '<i class="fa-solid fa-volume-xmark"></i>';

    }else{

        bgMusic.play();

        musicPlaying = true;

        musicToggle.innerHTML =
        '<i class="fa-solid fa-music"></i>';

    }

});
</script>
